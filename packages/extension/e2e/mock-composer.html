<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0; min-height: 100vh; background: #0d0d0f; color: #ececf1;
        font: 15px/1.5 ui-sans-serif, system-ui, sans-serif;
        display: flex; flex-direction: column;
      }
      header { padding: 14px 20px; border-bottom: 1px solid #23232a; font-weight: 600; }
      main { flex: 1; display: flex; align-items: flex-end; padding: 24px; }
      .composer-wrap {
        width: 100%; max-width: 720px; margin: 0 auto;
        border: 1px solid #2a2a32; border-radius: 16px; background: #1a1a1f; padding: 14px 16px;
        display: flex; align-items: center; gap: 12px;
      }
      #composer {
        flex: 1; min-height: 24px; max-height: 200px; overflow: auto; outline: none;
        white-space: pre-wrap; word-break: break-word;
      }
      #composer:empty::before { content: 'Message the assistant…'; color: #6b6b78; }
      .send { width: 32px; height: 32px; border-radius: 8px; background: #ececf1; color: #1a1a1f; border: 0; font-weight: 700; cursor: pointer; }
    </style>
  </head>
  <body>
    <header>Mock AI Chat (composer replica for verification)</header>
    <main>
      <div class="composer-wrap">
        <div id="composer" contenteditable="true" role="textbox"></div>
        <button class="send" id="send" data-testid="send-button">↑</button>
      </div>
    </main>
  </body>
</html>
